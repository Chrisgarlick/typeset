server {
    listen 80;
    server_name typeset.chrisgarlick.com;

    # API — proxied to Rust service
    location /api/ {
        proxy_pass         http://127.0.0.1:3200;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_read_timeout 60s;
        limit_req zone=typeset_api burst=20 nodelay;
    }

    # Health check
    location /health {
        proxy_pass http://127.0.0.1:3200;
    }

    # Frontend — everything else goes to Next.js
    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
    }
}

# Rate limit zone (add to http block in /etc/nginx/nginx.conf)
# limit_req_zone $binary_remote_addr zone=typeset_api:10m rate=30r/m;
