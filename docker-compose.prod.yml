services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: typeset
      POSTGRES_USER: typeset
      POSTGRES_PASSWORD: ${DB_PASSWORD:-typeset}
    volumes:
      - pgdata:/var/lib/postgresql/data

  typeset:
    image: ghcr.io/chrisgarlick/typeset/api:latest
    restart: unless-stopped
    ports:
      - "3200:3200"
    environment:
      PORT: 3200
      HOST: 0.0.0.0
      RUST_LOG: info
      DATABASE_URL: postgresql://typeset:${DB_PASSWORD:-typeset}@db:5432/typeset
      TYPESET_TOKEN: ${TYPESET_TOKEN}
      TYPESET_RATE_LIMIT_PER_MIN: ${TYPESET_RATE_LIMIT_PER_MIN:-10}
      MAX_RENDER_CONCURRENCY: 4
      RENDER_TIMEOUT_SECS: 30
    depends_on:
      - db

  frontend:
    image: ghcr.io/chrisgarlick/typeset/frontend:latest
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://typeset:3200
      NEXT_PUBLIC_API_TOKEN: ${TYPESET_TOKEN}
    depends_on:
      - typeset

volumes:
  pgdata:
